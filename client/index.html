<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%2308080c'/><text y='78' x='18' font-size='80' font-family='Arial,sans-serif' font-weight='bold' fill='%23e8c060'>G</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gamratic — Rate. Review. Discover. The ultimate game review platform." />
    <title>Gamratic — Rate. Review. Discover.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      /* ─── Design System Variables ──────────────────── */
      :root {
        --color-bg: #08080c;
        --color-surface: #0e0e14;
        --color-surface-hover: #16161e;
        --color-accent: #e8c060;
        --color-accent-dim: #d4a43a;
        --color-text: #f0f0f0;
        --color-text-muted: #888;
        --color-border: #ffffff08;
        --color-border-hover: #ffffff15;
        --color-green: #22c55e;
        --color-red: #ef4444;
        --color-yellow: #eab308;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --shadow-card: 0 2px 10px rgba(0,0,0,0.3);
        --shadow-card-hover: 0 20px 50px rgba(0,0,0,0.5);
        --shadow-glow: 0 0 60px rgba(232,192,96,0.06);
        --font-display: 'Bebas Neue', sans-serif;
        --font-body: 'Inter', Georgia, 'Times New Roman', serif;
        --transition-fast: 150ms ease;
        --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; height: 100%; }
      body {
        font-family: var(--font-body);
        background-color: var(--color-bg);
        color: var(--color-text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        min-height: 100%;
      }
      a { color: inherit; text-decoration: none; }
      #root { min-height: 100vh; display: flex; flex-direction: column; }

      /* Selection */
      ::selection { background: #e8c06040; color: #fff; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: var(--color-bg); }
      ::-webkit-scrollbar-thumb { background: #e8c06020; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #e8c06050; }

      /* ─── Animations ────────────────────────────────── */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(24px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 20px #e8c06015; }
        50% { box-shadow: 0 0 40px #e8c06030; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }
      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes orbFloat1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(30px, -40px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.95); }
      }
      @keyframes orbFloat2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(-40px, 30px) scale(0.9); }
        66% { transform: translate(25px, -25px) scale(1.05); }
      }
      @keyframes meshGradient {
        0% { background-position: 0% 0%; }
        50% { background-position: 100% 100%; }
        100% { background-position: 0% 0%; }
      }
      @keyframes subtleShimmer {
        0% { opacity: 0.3; }
        50% { opacity: 0.6; }
        100% { opacity: 0.3; }
      }

      /* Focus styles */
      :focus-visible {
        outline: 2px solid var(--color-accent);
        outline-offset: 2px;
      }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        html { scroll-behavior: auto; }
      }

      /* Global transitions for interactive elements */
      button, a, input, select, textarea {
        transition: all var(--transition-normal);
      }
      button { cursor: pointer; }
      button:active { transform: scale(0.97); }

      /* Page transitions */
      @keyframes pageEnter {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pageExit {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(-10px); }
      }

      /* Toast animations */
      @keyframes toastEnter {
        from { opacity: 0; transform: translateX(60px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes toastExit {
        from { opacity: 1; transform: translateX(0); }
        to { opacity: 0; transform: translateX(60px); }
      }

      /* ─── Noise texture ──────────────────────────── */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        opacity: 0.018;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9999;
      }

      /* ─── Ambient background orbs ─────────────────── */
      body::after {
        content: '';
        position: fixed;
        top: -200px;
        right: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, #e8c06008 0%, transparent 70%);
        animation: orbFloat1 20s ease-in-out infinite;
        pointer-events: none;
        z-index: -1;
      }

      /* ─── Responsive ────────────────────────────────── */
      @media (max-width: 1024px) {
        .game-detail-grid { grid-template-columns: 1fr !important; }
      }

      @media (max-width: 768px) {
        nav { padding: 0 16px !important; }
        nav .nav-links { display: none !important; }
        .hero-title { font-size: 28px !important; }
        .catalog-header h1 { font-size: 32px !important; }
      }

      @media (max-width: 480px) {
        nav { height: 56px !important; }
        nav .nav-search { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
